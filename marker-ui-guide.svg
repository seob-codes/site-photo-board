<svg viewBox="0 0 820 600" xmlns="http://www.w3.org/2000/svg" role="img">
<title>마커 기능 이름 안내도</title>
<desc>현장보드판 앱의 마커 모드 화면과 마커 설정 패널 각 부분의 이름을 보여주는 안내 그림</desc>
<rect width="820" height="600" fill="#0f1117"/>

<!-- ===== 카메라 화면 영역 ===== -->
<rect x="40" y="40" width="380" height="260" rx="16" fill="#15182a"/>
<text x="60" y="68" font-family="sans-serif" font-size="13" fill="#9aa3c0">카메라 화면</text>

<!-- 마커 모드 토글 버튼 -->
<circle cx="380" cy="70" r="18" fill="#262b40" stroke="#4f8ef7" stroke-width="2"/>
<text x="380" y="75" font-size="14" text-anchor="middle">📍</text>

<!-- 원 마커(선택됨, 점선 테두리) -->
<circle cx="140" cy="170" r="16" fill="none" stroke="#ff3b30" stroke-width="2"/>
<circle cx="140" cy="170" r="22" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="4 4"/>

<!-- 화살표 마커 -->
<g stroke="#ffd60a" fill="#ffd60a">
  <line x1="250" y1="230" x2="320" y2="230" stroke-width="4"/>
  <polygon points="320,222 336,230 320,238"/>
</g>

<!-- ===== 콜아웃 라벨 (카메라 영역) ===== -->
<!-- 마커 모드 버튼 -->
<line x1="398" y1="70" x2="470" y2="70" stroke="#3a4060" stroke-width="1.5"/>
<rect x="472" y="52" width="290" height="36" rx="8" fill="#0f1117" stroke="#2a2f45"/>
<text x="486" y="75" font-family="sans-serif" font-size="14" fill="#e8eaf2">마커 모드 버튼 — 켜야 화면 탭이 마커로 찍힘</text>

<!-- 선택된 마커 -->
<line x1="160" y1="155" x2="200" y2="110" stroke="#3a4060" stroke-width="1.5"/>
<rect x="200" y="80" width="280" height="58" rx="8" fill="#0f1117" stroke="#2a2f45"/>
<text x="214" y="102" font-family="sans-serif" font-size="14" fill="#e8eaf2">선택된 마커</text>
<text x="214" y="122" font-family="sans-serif" font-size="12" fill="#9aa3c0">흰 점선 테두리 = 지금 고른 마커</text>

<!-- 원 모양 마커 -->
<line x1="124" y1="186" x2="90" y2="230" stroke="#3a4060" stroke-width="1.5"/>
<rect x="40" y="230" width="220" height="58" rx="8" fill="#0f1117" stroke="#2a2f45"/>
<text x="54" y="252" font-family="sans-serif" font-size="14" fill="#e8eaf2">원 모양 마커</text>
<text x="54" y="272" font-family="sans-serif" font-size="12" fill="#9aa3c0">빨간 얇은 선, 채우기 없음</text>

<!-- 화살표 모양 마커 -->
<line x1="290" y1="222" x2="320" y2="180" stroke="#3a4060" stroke-width="1.5"/>
<rect x="310" y="140" width="220" height="58" rx="8" fill="#0f1117" stroke="#2a2f45"/>
<text x="324" y="162" font-family="sans-serif" font-size="14" fill="#e8eaf2">화살표 모양 마커</text>
<text x="324" y="182" font-family="sans-serif" font-size="12" fill="#9aa3c0">짧게 끌면 회전+길이, 길게 눌러 끌면 이동</text>

<!-- ===== 마커 설정 패널 영역 ===== -->
<rect x="40" y="340" width="740" height="200" rx="16" fill="#0f1117" stroke="#2a2f45"/>
<text x="60" y="368" font-family="sans-serif" font-size="13" fill="#9aa3c0">마커 설정 패널 (마커 모드 켜면 나타남)</text>

<!-- 모양 선택 버튼 3개 -->
<g font-family="sans-serif">
  <rect x="64" y="390" width="40" height="40" rx="8" fill="#1f2333" stroke="#4f8ef7" stroke-width="2"/>
  <text x="84" y="416" font-size="18" text-anchor="middle">⭕</text>
  <rect x="112" y="390" width="40" height="40" rx="8" fill="#1f2333" stroke="#2a2f45"/>
  <text x="132" y="416" font-size="18" text-anchor="middle">➜</text>
  <rect x="160" y="390" width="40" height="40" rx="8" fill="#1f2333" stroke="#2a2f45"/>
  <text x="180" y="416" font-size="18" text-anchor="middle" font-weight="700">Ｔ</text>
</g>
<line x1="132" y1="438" x2="132" y2="470" stroke="#3a4060" stroke-width="1.5"/>
<text x="64" y="490" font-family="sans-serif" font-size="13" fill="#e8eaf2">모양 선택 버튼 (원 / 화살표 / 텍스트)</text>

<!-- 텍스트 입력칸 -->
<rect x="220" y="392" width="140" height="36" rx="6" fill="#1f2333" stroke="#2a2f45"/>
<text x="232" y="415" font-family="sans-serif" font-size="12" fill="#666f8f">예: 균열</text>
<line x1="290" y1="430" x2="290" y2="470" stroke="#3a4060" stroke-width="1.5"/>
<text x="220" y="490" font-family="sans-serif" font-size="13" fill="#e8eaf2">텍스트 입력칸</text>
<text x="220" y="508" font-family="sans-serif" font-size="12" fill="#9aa3c0">텍스트 모양 고를 때만 보임, 최대 10글자</text>

<!-- 색상 버튼 5개 -->
<g>
  <circle cx="404" cy="410" r="13" fill="#ff3b30" stroke="#fff" stroke-width="2"/>
  <circle cx="436" cy="410" r="13" fill="#4f8ef7" stroke="#2a2f45" stroke-width="2"/>
  <circle cx="468" cy="410" r="13" fill="#ffd60a" stroke="#2a2f45" stroke-width="2"/>
  <circle cx="500" cy="410" r="13" fill="#4fca87" stroke="#2a2f45" stroke-width="2"/>
  <circle cx="532" cy="410" r="13" fill="#000" stroke="#2a2f45" stroke-width="2"/>
</g>
<line x1="468" y1="424" x2="468" y2="470" stroke="#3a4060" stroke-width="1.5"/>
<text x="404" y="490" font-family="sans-serif" font-size="13" fill="#e8eaf2">색상 선택 버튼 (5가지)</text>

<!-- 지우기 버튼 -->
<rect x="630" y="392" width="76" height="36" rx="6" fill="#1f2333" stroke="#f75f5f"/>
<text x="668" y="415" font-family="sans-serif" font-size="13" fill="#f75f5f" text-anchor="middle">지우기</text>
<line x1="668" y1="430" x2="668" y2="470" stroke="#3a4060" stroke-width="1.5"/>
<text x="600" y="490" font-family="sans-serif" font-size="13" fill="#e8eaf2">지우기 버튼</text>
<text x="600" y="508" font-family="sans-serif" font-size="12" fill="#9aa3c0">선택된 마커 1개만 삭제</text>
</svg>
