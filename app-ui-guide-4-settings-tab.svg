<svg viewBox="0 0 820 700" xmlns="http://www.w3.org/2000/svg" role="img">
<title>설정 탭 안내도</title>
<desc>현장보드판 앱 설정 탭에 있는 각 카드(섹션) 이름을 보여주는 안내 그림</desc>
<rect width="820" height="700" fill="#0f1117"/>
<text x="40" y="44" font-family="sans-serif" font-size="16" font-weight="700" fill="#e8eaf2">⚙️ 설정 탭 — 카드(섹션) 8개</text>

<g font-family="sans-serif">
<!-- 카드 목록(좌측 모형) -->
<rect x="40" y="64" width="280" height="600" rx="12" fill="#181c2c" stroke="#2a2f45"/>
<text x="60" y="96" font-size="13" font-weight="700" fill="#4f8ef7">기기 코드</text>
<text x="60" y="146" font-size="13" font-weight="700" fill="#4f8ef7">Apps Script 코드</text>
<text x="60" y="196" font-size="13" font-weight="700" fill="#4f8ef7">드라이브 연동</text>
<text x="60" y="246" font-size="13" font-weight="700" fill="#4f8ef7">워터마크 설정</text>
<text x="60" y="296" font-size="13" font-weight="700" fill="#4f8ef7">완료확인서 정보</text>
<text x="60" y="346" font-size="13" font-weight="700" fill="#4f8ef7">목록 관리</text>
<text x="60" y="396" font-size="13" font-weight="700" fill="#4f8ef7">옵션</text>
<text x="60" y="446" font-size="13" font-weight="700" fill="#f7a84f">라이선스 안내(맨 아래)</text>
<line x1="60" y1="110" x2="300" y2="110" stroke="#2a2f45"/>
<line x1="60" y1="160" x2="300" y2="160" stroke="#2a2f45"/>
<line x1="60" y1="210" x2="300" y2="210" stroke="#2a2f45"/>
<line x1="60" y1="260" x2="300" y2="260" stroke="#2a2f45"/>
<line x1="60" y1="310" x2="300" y2="310" stroke="#2a2f45"/>
<line x1="60" y1="360" x2="300" y2="360" stroke="#2a2f45"/>
<line x1="60" y1="410" x2="300" y2="410" stroke="#2a2f45"/>
</g>

<!-- 콜아웃 설명 (우측) -->
<g font-family="sans-serif">
<line x1="320" y1="90" x2="360" y2="90" stroke="#3a4060"/>
<text x="364" y="94" font-size="12" fill="#9aa3c0">이 기기의 고유 코드(복사해서 개발자에게 승인 요청)</text>

<line x1="320" y1="140" x2="360" y2="140" stroke="#3a4060"/>
<text x="364" y="144" font-size="12" fill="#9aa3c0">드라이브 업로드용 서버 코드(개발자가 Apps Script에 붙여넣음)</text>

<line x1="320" y1="190" x2="360" y2="190" stroke="#3a4060"/>
<text x="364" y="194" font-size="12" fill="#9aa3c0">Apps Script 주소(URL) + 폴더ID 입력 — 헤더의 "드라이브 미연결"과 연결됨</text>

<line x1="320" y1="240" x2="360" y2="240" stroke="#3a4060"/>
<text x="364" y="244" font-size="12" fill="#9aa3c0">사진에 표시될 조직명(예: 회사명) 입력</text>

<line x1="320" y1="290" x2="360" y2="290" stroke="#3a4060"/>
<text x="364" y="294" font-size="12" fill="#9aa3c0">공사명/보수업체/작업자/현장대리인 — 완료확인서에 쓰임</text>

<line x1="320" y1="340" x2="360" y2="340" stroke="#3a4060"/>
<text x="364" y="344" font-size="12" fill="#9aa3c0">단지명/공종/위치/하자내용 드롭다운 목록 추가·삭제</text>

<line x1="320" y1="390" x2="360" y2="390" stroke="#3a4060"/>
<text x="364" y="394" font-size="12" fill="#9aa3c0">워터마크 표시 / 저장 후 다음 단계(전→중→후) 자동 전환 켜고 끄기</text>

<line x1="320" y1="440" x2="360" y2="440" stroke="#3a4060"/>
<text x="364" y="444" font-size="12" fill="#9aa3c0">무단 복제·배포 금지 안내문(주황 박스)</text>
</g>
</svg>
