<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" role="img">
<title>앱 상단 헤더와 탭 안내도</title>
<desc>현장보드판 앱 상단의 헤더(앱 이름, 드라이브 연결 상태)와 3개 탭 이름을 보여주는 안내 그림</desc>
<rect width="760" height="360" fill="#0f1117"/>

<!-- 헤더 영역 모형 -->
<rect x="40" y="40" width="500" height="56" rx="10" fill="#181c2c" stroke="#2a2f45"/>
<text x="60" y="74" font-family="sans-serif" font-size="17" font-weight="700" fill="#e8eaf2">써비의 현장 <tspan fill="#4f8ef7">보드판</tspan></text>
<rect x="420" y="56" width="100" height="24" rx="12" fill="#262b40" stroke="#3a4060"/>
<text x="470" y="72" font-family="sans-serif" font-size="10" font-weight="600" fill="#9aa3c0" text-anchor="middle">드라이브 미연결</text>

<!-- 탭 모형 -->
<g font-family="sans-serif" font-size="14">
  <rect x="40" y="106" width="160" height="40" rx="8" fill="#181c2c" stroke="#2a2f45"/>
  <text x="120" y="131" text-anchor="middle" fill="#e8eaf2">📋 작업목록</text>
  <rect x="210" y="106" width="160" height="40" rx="8" fill="#1f2840" stroke="#4f8ef7" stroke-width="2"/>
  <text x="290" y="131" text-anchor="middle" fill="#e8eaf2">📷 촬영</text>
  <rect x="380" y="106" width="160" height="40" rx="8" fill="#181c2c" stroke="#2a2f45"/>
  <text x="460" y="131" text-anchor="middle" fill="#e8eaf2">⚙️ 설정</text>
</g>

<!-- 콜아웃: 앱 이름(헤더) -->
<line x1="160" y1="40" x2="120" y2="180" stroke="#3a4060" stroke-width="1.5"/>
<rect x="40" y="180" width="220" height="56" rx="8" fill="#0f1117" stroke="#2a2f45"/>
<text x="54" y="202" font-size="14" fill="#e8eaf2" font-family="sans-serif">헤더 (앱 이름)</text>
<text x="54" y="222" font-size="12" fill="#9aa3c0" font-family="sans-serif">"써비의 현장보드판" — 화면 맨 위 제목줄</text>

<!-- 콜아웃: 드라이브 배지 -->
<line x1="470" y1="80" x2="500" y2="180" stroke="#3a4060" stroke-width="1.5"/>
<rect x="380" y="180" width="320" height="56" rx="8" fill="#0f1117" stroke="#2a2f45"/>
<text x="394" y="202" font-size="14" fill="#e8eaf2" font-family="sans-serif">드라이브 연결 상태 배지</text>
<text x="394" y="222" font-size="12" fill="#9aa3c0" font-family="sans-serif">눌러서 설정 탭 "드라이브 연동"으로 이동</text>

<!-- 콜아웃: 탭 3개 -->
<line x1="290" y1="146" x2="290" y2="260" stroke="#3a4060" stroke-width="1.5"/>
<rect x="120" y="260" width="340" height="78" rx="8" fill="#0f1117" stroke="#2a2f45"/>
<text x="134" y="282" font-size="14" fill="#e8eaf2" font-family="sans-serif">탭 3개</text>
<text x="134" y="302" font-size="12" fill="#9aa3c0" font-family="sans-serif">작업목록 탭 / 촬영 탭 / 설정 탭</text>
<text x="134" y="320" font-size="12" fill="#9aa3c0" font-family="sans-serif">눌러서 화면을 바꿈, 진한 파란 테두리=지금 보는 탭</text>
</svg>
